apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: logging-operator-admin
  namespace: openshift-logging
subjects:
  - kind: ServiceAccount
    name: cluster-logging-operator
    namespace: openshift-logging
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
