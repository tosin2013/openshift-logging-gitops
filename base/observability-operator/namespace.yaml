apiVersion: v1
kind: Namespace
metadata:
  name: openshift-observability-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: observability-operator-admin
  namespace: openshift-observability-operator
subjects:
  - kind: ServiceAccount
    name: observability-operator-controller-manager
    namespace: openshift-observability-operator
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
