apiVersion: v1
kind: Namespace
metadata:
  name: openshift-operators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loki-operator-admin
  namespace: openshift-operators
subjects:
  - kind: ServiceAccount
    name: loki-operator-controller-manager
    namespace: openshift-operators
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
