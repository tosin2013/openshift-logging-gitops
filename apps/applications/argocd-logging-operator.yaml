apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/openshift-logging-gitops.git
    targetRevision: HEAD
    path: base/logging-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
